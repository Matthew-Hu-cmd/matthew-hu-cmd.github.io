---
layout: default
---

<article class="post-entry" itemscope itemtype="http://schema.org/BlogPosting">
  <header class="post-hero">
    <div class="post-hero__meta">{{ page.date | date: "%B %d, %Y" }}</div>
    <h1 class="post-hero__title" itemprop="headline">{{ page.title }}</h1>
    {% if page.excerpt %}
      <p class="post-hero__excerpt">{{ page.excerpt }}</p>
    {% endif %}
  </header>

  <section itemprop="articleBody">
    {{ content }}
  </section>
</article>
